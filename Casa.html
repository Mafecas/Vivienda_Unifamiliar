<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vivienda 150m² - Modelo 3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080c14;overflow:hidden;height:100vh;font-family:'Segoe UI',system-ui,sans-serif;color:#ddd}
canvas{display:block}
#app{position:relative;width:100%;height:100vh}

.hud{position:absolute;pointer-events:none;z-index:5}
.hud>*{pointer-events:all}

#header{top:12px;left:12px}
.card{background:rgba(8,12,20,.88);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:12px 16px}
#header h1{font-size:15px;font-weight:700;color:#7ab8ff;margin-bottom:2px}
#header p{font-size:11px;color:#8a94a6;line-height:1.5}
#header span{color:#7ab8ff}

#sidebar{top:12px;right:12px;display:flex;flex-direction:column;gap:4px;width:195px}
.btn{
  background:rgba(20,28,45,.9);border:1px solid rgba(122,184,255,.15);
  color:#b0bcc8;padding:8px 11px;border-radius:7px;cursor:pointer;
  font:500 11px/1.3 'Segoe UI',system-ui,sans-serif;text-align:left;
  transition:background .15s,border-color .15s,color .15s;display:flex;align-items:center;gap:7px
}
.btn:hover{background:rgba(122,184,255,.12);border-color:rgba(122,184,255,.4);color:#fff}
.btn.on{background:rgba(122,184,255,.2);border-color:#7ab8ff;color:#7ab8ff}
.btn .ic{font-size:13px;width:16px;text-align:center}
.sep{height:1px;background:rgba(255,255,255,.04);margin:3px 0}
.tag{font-size:8px;letter-spacing:1.2px;color:#4a5568;text-transform:uppercase;padding:2px 0 3px;font-weight:600}

#legend{bottom:12px;left:12px;max-width:380px}
#legend h4{font-size:10px;color:#7ab8ff;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.lrow{display:flex;flex-wrap:wrap;gap:4px 14px}
.li{display:flex;align-items:center;gap:5px;font-size:10px;color:#9aa4b4}
.ldot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.lpipe{width:18px;height:5px;border-radius:3px;flex-shrink:0}

#tip{bottom:12px;right:12px;font-size:9px;color:#5a6478;padding:8px 11px}
</style>
</head>
<body>
<div id="app">
  <div class="hud" id="header">
    <div class="card">
      <h1>Vivienda Unifamiliar · 150 m²</h1>
      <p>Vivienda Unifamiliar de Un Piso — 3 Hab · 3 Baños · 15×10 m<br>
      <span>Clic + arrastrar</span> rotar · <span>Scroll</span> zoom · <span>Clic derecho</span> mover</p>
    </div>
  </div>
  <div class="hud" id="sidebar">
    <div class="card" style="padding:8px;display:flex;flex-direction:column;gap:4px">
      <div class="tag">Vistas</div>
      <button class="btn on" data-v="3d" onclick="vw('3d',this)"><span class="ic">🏠</span>3D Perspectiva</button>
      <button class="btn" data-v="top" onclick="vw('top',this)"><span class="ic">📐</span>Planta</button>
      <button class="btn" data-v="front" onclick="vw('front',this)"><span class="ic">🧱</span>Fachada</button>
      <button class="btn" id="bRoof" onclick="tRoof()"><span class="ic">🏗</span>Ocultar techo</button>
      <button class="btn" id="bLbl" onclick="tLbl()"><span class="ic">🏷</span>Ocultar nombres</button>
      <div class="sep"></div>
      <div class="tag">Recorrido interior</div>
      <button class="btn" id="bWalk" onclick="toggleWalk()" style="border-left:3px solid #44dd88"><span class="ic">🚶</span>Entrar a la casa</button>
      <div class="sep"></div>
      <div class="tag">Capas técnicas</div>
      <button class="btn on" data-l="0" onclick="ly(0,this)"><span class="ic">🏠</span>Arquitectónica</button>
      <button class="btn" data-l="1" onclick="ly(1,this)"><span class="ic">⬜</span>Cimentación</button>
      <button class="btn" data-l="2" onclick="ly(2,this)"><span class="ic">⚡</span>Eléctrica</button>
      <button class="btn" data-l="3" onclick="ly(3,this)"><span class="ic">💧</span>Hidráulica</button>
      <button class="btn" data-l="4" onclick="ly(4,this)"><span class="ic">🔥</span>Gas</button>
      <button class="btn" data-l="5" onclick="ly(5,this)"><span class="ic">🔺</span>Cubierta</button>
    </div>
  </div>
  <div class="hud" id="legend"><div class="card"><h4 id="legT"></h4><div class="lrow" id="legR"></div></div></div>
  <div class="hud" id="tip"><div class="card">Esc 1:50 · 150 m²</div></div>

  <!-- Walkthrough overlay -->
  <div id="walkOverlay" style="display:none;position:absolute;top:0;left:0;width:100%;height:100%;z-index:20;pointer-events:none">
    <!-- Crosshair -->
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)">
      <div style="width:20px;height:2px;background:rgba(122,184,255,0.6);position:absolute;top:-1px;left:-10px"></div>
      <div style="width:2px;height:20px;background:rgba(122,184,255,0.6);position:absolute;top:-10px;left:-1px"></div>
    </div>
    <!-- Walk instructions -->
    <div id="walkHud" style="position:absolute;bottom:20px;left:50%;transform:translateX(-50%)">
      <div class="card" style="text-align:center;padding:10px 20px;pointer-events:all">
        <div style="font-size:11px;color:#7ab8ff;font-weight:600;margin-bottom:4px">RECORRIDO INTERIOR</div>
        <div style="font-size:10px;color:#8a94a6;line-height:1.6">
          <span style="color:#7ab8ff">W A S D</span> caminar ·
          <span style="color:#7ab8ff">Mouse</span> mirar ·
          <span style="color:#7ab8ff">Shift</span> correr ·
          <span style="color:#7ab8ff">ESC</span> salir
        </div>
      </div>
    </div>
    <!-- Room indicator -->
    <div id="roomIndicator" style="position:absolute;top:20px;left:50%;transform:translateX(-50%)">
      <div class="card" style="padding:6px 16px;pointer-events:all">
        <span style="font-size:11px;color:#7ab8ff;font-weight:600" id="roomName">SALA</span>
      </div>
    </div>
    <!-- Minimap -->
    <div id="minimap" style="position:absolute;top:20px;right:20px;pointer-events:all">
      <canvas id="minimapCanvas" width="150" height="100" style="border-radius:8px;border:1px solid rgba(122,184,255,0.2);background:rgba(8,12,20,0.85)"></canvas>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ══════════════════════════════════════
   SCENE
   ══════════════════════════════════════ */
var W=innerWidth, H=innerHeight;
var scene=new THREE.Scene();
scene.background=new THREE.Color(0x87CEEB);
scene.fog=new THREE.FogExp2(0x87CEEB,0.008);
var cam=new THREE.PerspectiveCamera(50,W/H,0.1,300);
var ren=new THREE.WebGLRenderer({antialias:true,alpha:false});
ren.setSize(W,H);
ren.setPixelRatio(Math.min(devicePixelRatio,2));
ren.shadowMap.enabled=true;
ren.shadowMap.type=THREE.PCFSoftShadowMap;
ren.toneMapping=THREE.ACESFilmicToneMapping;
ren.toneMappingExposure=1.4;
document.getElementById('app').insertBefore(ren.domElement,document.getElementById('app').firstChild);

/* lights — warm luxury ambiance */
var ambLight=new THREE.AmbientLight(0xfff8f0,0.45);
scene.add(ambLight);
var sun=new THREE.DirectionalLight(0xffeedd,1.0);
sun.position.set(20,35,15);
sun.castShadow=true;
sun.shadow.camera.left=-25;sun.shadow.camera.right=25;
sun.shadow.camera.top=20;sun.shadow.camera.bottom=-15;
sun.shadow.mapSize.width=2048;sun.shadow.mapSize.height=2048;
scene.add(sun);
var fill=new THREE.DirectionalLight(0xaaccff,0.25);
fill.position.set(-15,12,-10);
scene.add(fill);
scene.add(new THREE.HemisphereLight(0x88bbee,0x556633,0.35));

/* ══════════════════════════════════════
   ORBIT
   ══════════════════════════════════════ */
var dr=0,pn=0,pm={x:0,y:0};
var sp={r:28,t:0.75,p:1.0};
var tg=new THREE.Vector3(7.5,1,5);
function cu(){
  cam.position.set(
    tg.x+sp.r*Math.sin(sp.p)*Math.cos(sp.t),
    tg.y+sp.r*Math.cos(sp.p),
    tg.z+sp.r*Math.sin(sp.p)*Math.sin(sp.t));
  cam.lookAt(tg);
}
cu();
var el=ren.domElement;
el.addEventListener('mousedown',function(e){if(walkMode)return;if(e.button===0)dr=1;if(e.button===2)pn=1;pm={x:e.clientX,y:e.clientY};});
el.addEventListener('mousemove',function(e){
  if(walkMode)return;
  var dx=e.clientX-pm.x,dy=e.clientY-pm.y;
  if(dr){sp.t-=dx*0.005;sp.p=Math.max(0.15,Math.min(2.9,sp.p+dy*0.005));cu();}
  if(pn){var rv=new THREE.Vector3();var uv=new THREE.Vector3(0,1,0);cam.getWorldDirection(rv);rv.cross(uv).normalize();tg.addScaledVector(rv,-dx*0.02);tg.y+=dy*0.02;cu();}
  pm={x:e.clientX,y:e.clientY};
});
window.addEventListener('mouseup',function(){dr=0;pn=0;});
el.addEventListener('contextmenu',function(e){e.preventDefault();});
el.addEventListener('wheel',function(e){if(walkMode)return;sp.r=Math.max(4,Math.min(60,sp.r+e.deltaY*0.025));cu();});
/* touch */
var ltd=0;
el.addEventListener('touchstart',function(e){
  if(walkMode)return;
  if(e.touches.length===1){dr=1;pm={x:e.touches[0].clientX,y:e.touches[0].clientY};}
  if(e.touches.length===2){var a=e.touches[0],b=e.touches[1];ltd=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);}
},{passive:true});
el.addEventListener('touchmove',function(e){
  e.preventDefault();
  if(e.touches.length===1&&dr){
    var dx=e.touches[0].clientX-pm.x,dy=e.touches[0].clientY-pm.y;
    sp.t-=dx*0.005;sp.p=Math.max(0.15,Math.min(2.9,sp.p+dy*0.005));cu();
    pm={x:e.touches[0].clientX,y:e.touches[0].clientY};
  }
  if(e.touches.length===2){
    var a=e.touches[0],b=e.touches[1];
    var d=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);
    sp.r=Math.max(4,Math.min(60,sp.r-(d-ltd)*0.04));ltd=d;cu();
  }
},{passive:false});
el.addEventListener('touchend',function(){dr=0;},{passive:true});

/* ══════════════════════════════════════
   HELPERS
   ══════════════════════════════════════ */
function BX(w,h,d,mat){
  var m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  m.castShadow=true;m.receiveShadow=true;return m;
}
function pos(m,x,y,z){m.position.set(x,y,z);return m;}

/* pipe material with glow */
function PM(color,em){
  em=em===undefined?0.4:em;
  return new THREE.MeshStandardMaterial({color:color,emissive:color,emissiveIntensity:em,roughness:0.2,metalness:0.55});
}

/* build tube between 3D points with joint spheres */
function TUBE(grp,pts,r,mat){
  var i,a,b,dir,len,pipe,joint;
  for(i=0;i<pts.length-1;i++){
    a=new THREE.Vector3(pts[i][0],pts[i][1],pts[i][2]);
    b=new THREE.Vector3(pts[i+1][0],pts[i+1][1],pts[i+1][2]);
    dir=new THREE.Vector3().subVectors(b,a);
    len=dir.length();
    if(len<0.005)continue;
    pipe=new THREE.Mesh(new THREE.CylinderGeometry(r,r,len,10),mat);
    pipe.position.lerpVectors(a,b,0.5);
    dir.normalize();
    pipe.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dir);
    pipe.castShadow=true;
    grp.add(pipe);
    /* joint sphere at bend */
    if(i>0){
      joint=new THREE.Mesh(new THREE.SphereGeometry(r*1.4,8,8),mat);
      joint.position.copy(a);
      grp.add(joint);
    }
  }
  /* end caps */
  var cap1=new THREE.Mesh(new THREE.SphereGeometry(r*1.15,8,8),mat);
  cap1.position.set(pts[0][0],pts[0][1],pts[0][2]);
  grp.add(cap1);
  var cap2=new THREE.Mesh(new THREE.SphereGeometry(r*1.15,8,8),mat);
  cap2.position.set(pts[pts.length-1][0],pts[pts.length-1][1],pts[pts.length-1][2]);
  grp.add(cap2);
}

/* floating 3D label */
function LBL(txt,x,y,z,col,sc){
  var cv=document.createElement('canvas');
  cv.width=512;cv.height=256;
  var cx=cv.getContext('2d');
  cx.clearRect(0,0,512,256);
  cx.fillStyle=col||'#ffffff';
  cx.font='bold 60px sans-serif';
  cx.textAlign='center';
  var lines=txt.split('\n');
  for(var i=0;i<lines.length;i++){
    cx.fillText(lines[i],256,80+i*68);
  }
  var tex=new THREE.CanvasTexture(cv);
  tex.minFilter=THREE.LinearFilter;
  var sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false}));
  sp.scale.set(sc||1.8,(sc||1.8)*0.5,1);
  sp.position.set(x,y,z);
  return sp;
}

/* valve symbol */
function VALVE(grp,x,y,z,mat){
  var body=new THREE.Mesh(new THREE.SphereGeometry(0.1,10,10),mat);
  body.position.set(x,y,z);grp.add(body);
  var stem=new THREE.Mesh(new THREE.CylinderGeometry(0.015,0.015,0.2,6),new THREE.MeshStandardMaterial({color:0x444444}));
  stem.position.set(x,y+0.15,z);grp.add(stem);
  var wheel=new THREE.Mesh(new THREE.TorusGeometry(0.05,0.012,6,12),new THREE.MeshStandardMaterial({color:0xdd0000,emissive:0x880000,emissiveIntensity:0.3}));
  wheel.position.set(x,y+0.26,z);grp.add(wheel);
}

/* ══════════════════════════════════════
   GROUPS & MATERIAL CACHE
   ══════════════════════════════════════ */
var GR={
  arch:new THREE.Group(),
  lbl:new THREE.Group(),
  gnd:new THREE.Group(),
  found:new THREE.Group(),
  elec:new THREE.Group(),
  plmb:new THREE.Group(),
  gas:new THREE.Group(),
  roof:new THREE.Group(),
  meters:new THREE.Group()  /* contadores — siempre visibles */
};
var k;for(k in GR)scene.add(GR[k]);
GR.found.visible=false;
GR.elec.visible=false;
GR.plmb.visible=false;
GR.gas.visible=false;

var origMat=new Map();
var WH=2.8, ET=0.15, IT=0.12;

/* shared materials — LUXURY FINISHES */
var MAT={
  wallE:new THREE.MeshStandardMaterial({color:0xf5f0e8,roughness:0.4,metalness:0.05}),
  wallI:new THREE.MeshStandardMaterial({color:0xf8f4ef,roughness:0.5}),
  floor:new THREE.MeshStandardMaterial({color:0xd4b896,roughness:0.3,metalness:0.1}), /* porcelanato madera */
  flBath:new THREE.MeshStandardMaterial({color:0xe8e8e8,roughness:0.15,metalness:0.15}), /* mármol */
  flKit:new THREE.MeshStandardMaterial({color:0xc8bba8,roughness:0.2,metalness:0.1}), /* porcelanato */
  door:new THREE.MeshStandardMaterial({color:0x3a2510,roughness:0.3,metalness:0.05}), /* madera oscura */
  glass:new THREE.MeshStandardMaterial({color:0x99ccee,roughness:0.0,transparent:true,opacity:0.25,metalness:0.3,side:THREE.DoubleSide}),
  conc:new THREE.MeshStandardMaterial({color:0xc8c0b8,roughness:0.6}),
  ground:new THREE.MeshStandardMaterial({color:0x4a7a3a,roughness:0.9}),
  furn:new THREE.MeshStandardMaterial({color:0x6b4423,roughness:0.35,metalness:0.05}), /* madera nogal */
  bed:new THREE.MeshStandardMaterial({color:0xf0e6d8,roughness:0.8}),
  sofa:new THREE.MeshStandardMaterial({color:0x4a5a40,roughness:0.6}), /* cuero verde */
  counter:new THREE.MeshStandardMaterial({color:0x2a2a2a,roughness:0.1,metalness:0.4}), /* granito negro */
  porc:new THREE.MeshStandardMaterial({color:0xfafafa,roughness:0.08,metalness:0.1}), /* porcelana brillante */
  roof:new THREE.MeshStandardMaterial({color:0x8b3a1a,roughness:0.5,side:THREE.DoubleSide}),
  zap:new THREE.MeshStandardMaterial({color:0x7a7a7a,roughness:0.8}),
  /* pipes */
  pAF:PM(0x1a77cc,0.45),
  pAC:PM(0xdd3318,0.5),
  pDR:PM(0x1a8a3a,0.4),
  pElec:PM(0xee1111,0.55),
  pGas:PM(0xddaa00,0.55),
  pDuct:PM(0x777777,0.15)
};

/* ══════════════════════════════════════
   1 · ARCHITECTURE
   ══════════════════════════════════════ */
(function buildArch(){
  var g=GR.arch;

  /* ═══ LUXURY LANDSCAPE ═══ */
  /* Main grass */
  var gnd=new THREE.Mesh(new THREE.PlaneGeometry(80,80),MAT.ground);
  gnd.rotation.x=-Math.PI/2;gnd.position.set(7.5,-0.01,5);gnd.receiveShadow=true;
  GR.gnd.add(gnd);

  /* Paved perimeter (andén) */
  var paveMat=new THREE.MeshStandardMaterial({color:0xd0c8b8,roughness:0.4,metalness:0.05});
  var pave=new THREE.Mesh(new THREE.PlaneGeometry(18,13),paveMat);
  pave.rotation.x=-Math.PI/2;pave.position.set(7.5,0.005,5);pave.receiveShadow=true;
  GR.gnd.add(pave);

  /* Driveway / entrada vehicular */
  var driveMat=new THREE.MeshStandardMaterial({color:0xb8aa96,roughness:0.35,metalness:0.05});
  var drive=new THREE.Mesh(new THREE.PlaneGeometry(4,8),driveMat);
  drive.rotation.x=-Math.PI/2;drive.position.set(2.5,0.01,15);drive.receiveShadow=true;
  GR.gnd.add(drive);

  /* Walkway from entrance */
  var walkMat=new THREE.MeshStandardMaterial({color:0xc8bfaf,roughness:0.3});
  var walk1=BX(1.2,0.05,3,walkMat);walk1.position.set(2.5,0.03,12.5);walk1.receiveShadow=true;
  GR.gnd.add(walk1);

  /* ── PISCINA ── */
  var poolMat=new THREE.MeshStandardMaterial({color:0x2288bb,roughness:0.05,metalness:0.2,transparent:true,opacity:0.8});
  var poolEdge=new THREE.MeshStandardMaterial({color:0xe8e0d0,roughness:0.3});
  /* Pool border */
  var poolB=BX(5.2,0.15,3.2,poolEdge);poolB.position.set(7.5,0.08,-4);poolB.receiveShadow=true;GR.gnd.add(poolB);
  /* Pool water */
  var poolW=new THREE.Mesh(new THREE.PlaneGeometry(5,3),poolMat);
  poolW.rotation.x=-Math.PI/2;poolW.position.set(7.5,-0.1,-4);GR.gnd.add(poolW);
  /* Pool depth walls */
  var poolSide=new THREE.MeshStandardMaterial({color:0x1a6688,roughness:0.2});
  GR.gnd.add(pos(BX(5,0.5,0.08,poolSide),7.5,-0.1,-2.4));
  GR.gnd.add(pos(BX(5,0.5,0.08,poolSide),7.5,-0.1,-5.6));
  GR.gnd.add(pos(BX(0.08,0.5,3,poolSide),5,-0.1,-4));
  GR.gnd.add(pos(BX(0.08,0.5,3,poolSide),10,-0.1,-4));

  /* ── ÁRBOLES (cono + cilindro) ── */
  var trunkMat=new THREE.MeshStandardMaterial({color:0x5a3a1a,roughness:0.7});
  var leafMat=new THREE.MeshStandardMaterial({color:0x2a6a1a,roughness:0.6});
  var leafMat2=new THREE.MeshStandardMaterial({color:0x3a7a2a,roughness:0.55});
  var treePositions=[[-3,12],[-3,5],[-3,-2],[18,12],[18,5],[18,-2],[5,-7],[10,-7],[0,-5],[15,-5]];
  treePositions.forEach(function(tp){
    var trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.15,2,8),trunkMat);
    trunk.position.set(tp[0],1,tp[1]);trunk.castShadow=true;GR.gnd.add(trunk);
    var crown=new THREE.Mesh(new THREE.SphereGeometry(1.2,8,6),Math.random()>0.5?leafMat:leafMat2);
    crown.position.set(tp[0],2.8,tp[1]);crown.castShadow=true;GR.gnd.add(crown);
  });

  /* ── ARBUSTOS (esferas pequeñas) ── */
  var bushMat=new THREE.MeshStandardMaterial({color:0x3a6a2a,roughness:0.7});
  var bushPos=[[-1.5,11],[-1.5,9],[-1.5,7],[-1.5,3],[-1.5,1],[16.5,11],[16.5,9],[16.5,7],[16.5,3],[16.5,1],
               [3,-2],[5,-2],[10,-2],[12,-2],[2,12],[4,12],[11,12],[13,12]];
  bushPos.forEach(function(bp){
    var bush=new THREE.Mesh(new THREE.SphereGeometry(0.4+Math.random()*0.2,6,5),bushMat);
    bush.position.set(bp[0],0.3,bp[1]);bush.castShadow=true;GR.gnd.add(bush);
  });

  /* ── CERCO PERIMETRAL (muro bajo + rejas) ── */
  var fenceMat=new THREE.MeshStandardMaterial({color:0xd8d0c0,roughness:0.5});
  var railMat=new THREE.MeshStandardMaterial({color:0x222222,roughness:0.3,metalness:0.6});
  /* Muro bajo perimetral */
  [[-5,-8,30,0.15],[-5,-8,0.15,28],[-5,20,30,0.15],[25,-8,0.15,28]].forEach(function(w){
    var wall=BX(w[2]==0.15?0.15:w[2],0.6,w[3]==0.15?0.15:w[3],fenceMat);
    wall.position.set(w[0]+w[2]/2,0.3,w[1]+w[3]/2);wall.receiveShadow=true;GR.gnd.add(wall);
  });
  /* Rejas encima (barrotes verticales) */
  for(var fi=-5;fi<=25;fi+=0.8){

function toggleWalk(){
  walkMode=!walkMode;
  var btn=document.getElementById('bWalk');

  if(walkMode){

    btn.innerHTML='<span class="ic">🚶</span>Salir del recorrido';

    overlay.style.display='block';

    /* Hide orbit HUD, show walk HUD */
    document.getElementById('header').style.display='none';
    document.getElementById('legend').style.display='none';
    document.getElementById('tip').style.display='none';

    /* Auto-hide roof */
    wasRoofOn=roofOn;
    if(roofOn){GR.roof.visible=false;}

    /* Make sure architecture is fully visible */
    if(curL!==0) ly(0,document.querySelector('[data-l="0"]'));

    cam.fov=70;

function drawMinimap(){

  var ctx=mc.getContext('2d');
  var mw=mc.width, mh=mc.height;
  var sx=mw/17, sz=mh/12; /* scale with margin */
  var ox=1*sx, oz=1*sz;   /* offset */

  ctx.clearRect(0,0,mw,mh);

  /* House outline */
  ctx.strokeStyle='rgba(122,184,255,0.4)';
  ctx.lineWidth=1.5;
  ctx.strokeRect(ox,oz,15*sx,10*sz);

  /* Interior walls */
  ctx.strokeStyle='rgba(122,184,255,0.2)';
  ctx.lineWidth=1;
  /* Draw walls with door gaps matching collision data */
  var mwalls=[
    ['H',5,0,15,[[2.55,3.45],[7.55,8.45],[11.55,12.45]]],
    ['H',7,9,15,[[10.05,10.95]]],
    ['V',9,7,10,[[8.05,8.95]]],
    ['V',12,7,10,[[8.05,8.95]]],
    ['V',13,5,7,[[5.6,6.4]]],
    ['V',6.5,0,5,[]],
    ['V',10.5,0,5,[]],
    ['V',3.5,0,2.5,[[0.8,1.6]]],
    ['V',5,0,2.5,[]],
    ['H',2.5,3.5,6.5,[[5.35,6.15]]],
    ['H',2,6.5,8.5,[[7.1,7.9]]],
    ['V',8.5,0,2,[]]
  ];
  for(var mwi=0;mwi<mwalls.length;mwi++){
    var mw=mwalls[mwi];
    var segs=[];
    var prev=mw[2];
    for(var mdi=0;mdi<mw[4].length;mdi++){
      segs.push([prev,mw[4][mdi][0]]);
      prev=mw[4][mdi][1];
    }
    segs.push([prev,mw[3]]);
    ctx.strokeStyle='rgba(122,184,255,0.25)';
    ctx.lineWidth=1;
    for(var msi=0;msi<segs.length;msi++){
      var ms=segs[msi];
      ctx.beginPath();
      if(mw[0]==='H'){
        ctx.moveTo(ox+ms[0]*sx, oz+(10-mw[1])*sz);
        ctx.lineTo(ox+ms[1]*sx, oz+(10-mw[1])*sz);
      } else {
        ctx.moveTo(ox+mw[1]*sx, oz+(10-ms[0])*sz);
        ctx.lineTo(ox+mw[1]*sx, oz+(10-ms[1])*sz);
      }
      ctx.stroke();
    }
    /* Draw door gaps in green */
    ctx.strokeStyle='rgba(68,220,100,0.6)';
    ctx.lineWidth=2;
    for(mdi=0;mdi<mw[4].length;mdi++){
      var mg=mw[4][mdi];
      ctx.beginPath();
      if(mw[0]==='H'){
        ctx.moveTo(ox+mg[0]*sx, oz+(10-mw[1])*sz);
        ctx.lineTo(ox+mg[1]*sx, oz+(10-mw[1])*sz);
      } else {
        ctx.moveTo(ox+mw[1]*sx, oz+(10-mg[0])*sz);
        ctx.lineTo(ox+mw[1]*sx, oz+(10-mg[1])*sz);
      }
      ctx.stroke();
    }
  }
  /* Main entrance door on north wall */
  ctx.strokeStyle='rgba(68,220,100,0.8)';
  ctx.lineWidth=2.5;
  ctx.beginPath();
  ctx.moveTo(ox+2.0*sx, oz+0);
  ctx.lineTo(ox+3.0*sx, oz+0);
  ctx.stroke();

  /* Player position */
  var px=ox+fpPos.x*sx;
  var pz=oz+(10-fpPos.z)*sz; /* flip z for top-down */

  /* Direction indicator */
  var dirLen=1.2*sx;
  var dx=Math.sin(fpYaw)*dirLen;
  var dz=-Math.cos(fpYaw)*dirLen;

  /* FOV cone */
  ctx.fillStyle='rgba(122,184,255,0.08)';
  ctx.beginPath();
  ctx.moveTo(px,pz);
  var fovAngle=0.6;
  ctx.lineTo(px+Math.sin(fpYaw-fovAngle)*dirLen*2.5, pz-Math.cos(fpYaw-fovAngle)*dirLen*2.5);
  ctx.lineTo(px+Math.sin(fpYaw+fovAngle)*dirLen*2.5, pz-Math.cos(fpYaw+fovAngle)*dirLen*2.5);
  ctx.fill();

  /* Direction line */
  ctx.strokeStyle='rgba(122,184,255,0.7)';
  ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(px,pz);
  ctx.lineTo(px+dx,pz+dz);
  ctx.stroke();

  /* Player dot */
  ctx.fillStyle='#7ab8ff';
  ctx.beginPath();
  ctx.arc(px,pz,3,0,Math.PI*2);
  ctx.fill();
}

/* Movement with precise wall collision matching architecture */
var lastTime=performance.now();

/*
  Wall collision data — EXACTLY matching the architecture door openings.
  Horizontal walls (H): fixed Z, span along X, doors are X gaps
  Vertical walls (V): fixed X, span along Z, doors are Z gaps
  Format: [type, fixedCoord, rangeMin, rangeMax, [[gapMin,gapMax],...]]
*/
var WALLS=[
  /* ═══ EXTERIOR ═══ */
  ['H', 10,   0, 15,   [[2.0, 3.0]]],         /* North: main entrance */
  ['H', 0,    0, 15,   []],                    /* South */
  ['V', 0,    0, 10,   []],                    /* West */
  ['V', 15,   0, 10,   []],                    /* East */

  /* ═══ SOCIAL / PRIVADO ═══ */
  ['H', 5,    0, 15,   [[2.55,3.45],[7.55,8.45],[11.55,12.45]]], /* z=5: 3 doors */
  ['H', 7,    9, 15,   [[10.05,10.95]]],        /* z=7: solo puerta cocina */
  ['V', 9,    7, 10,   [[8.05,8.95]]],         /* x=9: comedor→cocina */
  ['V', 12,   7, 10,   [[8.05,8.95]]],         /* x=12: cocina→ropas */
  ['V', 13,   5, 7,    [[5.6,6.4]]],           /* x=13: paso→baño social */

  /* ═══ BEDROOM DIVIDERS ═══ */
  ['V', 6.5,  0, 5,    []],                    /* x=6.5 solid */
  ['V', 10.5, 0, 5,    []],                    /* x=10.5 solid */

  /* ═══ HAB PRINCIPAL: BAÑO + CLOSET ═══ */
  ['V', 3.5,  0, 2.5,  [[0.8,1.6]]],           /* x=3.5 baño ppal */
  ['V', 5,    0, 2.5,  []],                    /* x=5 baño/closet */
  ['H', 2.5,  3.5, 6.5, [[5.35,6.15]]],        /* z=2.5: closet door */

  /* ═══ BAÑO 2 ═══ */
  ['H', 2,    6.5, 8.5, [[7.1,7.9]]],          /* z=2 baño2 */
  ['V', 8.5,  0, 2,    []],                    /* x=8.5 baño2 */
];

var COL_R=0.25; /* player collision radius */

function checkAxis(oldVal, newVal, wallFixed, rangeMin, rangeMax, crossCoord, doors){
  /* Check if movement from oldVal to newVal crosses wallFixed,
     and if crossCoord is within [rangeMin,rangeMax] but NOT in a door gap */
  var lo=Math.min(oldVal,newVal)-COL_R;
  var hi=Math.max(oldVal,newVal)+COL_R;
  if(lo>wallFixed||hi<wallFixed) return false; /* doesn't cross */
  if(crossCoord<rangeMin-0.01||crossCoord>rangeMax+0.01) return false; /* outside wall span */
  /* Check if in a door gap */
  for(var d=0;d<doors.length;d++){
    if(crossCoord>doors[d][0]+0.05 && crossCoord<doors[d][1]-0.05) return false; /* in door */
  }
  return true; /* blocked */
}

function updateWalk(){
  var now=performance.now();
  var dt=(now-lastTime)/1000;
  lastTime=now;
  if(dt>0.1) dt=0.1;

  var spd=keys.shift?runSpeed:walkSpeed;
  var moveX=0, moveZ=0;

  if(keys.w){moveX+=Math.sin(fpYaw);moveZ+=Math.cos(fpYaw);}
  if(keys.s){moveX-=Math.sin(fpYaw);moveZ-=Math.cos(fpYaw);}
  if(keys.a){moveX+=Math.cos(fpYaw);moveZ-=Math.sin(fpYaw);}
  if(keys.d){moveX-=Math.cos(fpYaw);moveZ+=Math.sin(fpYaw);}

  var len=Math.sqrt(moveX*moveX+moveZ*moveZ);
  if(len>0){moveX/=len;moveZ/=len;}

  var dx=moveX*spd*dt;
  var dz=moveZ*spd*dt;
  var tryX=fpPos.x+dx;
  var tryZ=fpPos.z+dz;

  /* Per-axis collision: try X and Z independently for wall sliding */
  var canX=true, canZ=true;

  for(var wi=0;wi<WALLS.length;wi++){
    var w=WALLS[wi];
    if(w[0]==='V'){
      /* Vertical wall at fixed X: blocks X movement */
      if(canX && checkAxis(fpPos.x, tryX, w[1], w[2], w[3], fpPos.z, w[4])){
        canX=false;
      }
      /* Also check with new Z */
      if(canZ && checkAxis(fpPos.x, fpPos.x, w[1], w[2], w[3], tryZ, w[4])){
        /* standing next to wall, new Z puts us in wall span without door */
      }
    } else {
      /* Horizontal wall at fixed Z: blocks Z movement */
      if(canZ && checkAxis(fpPos.z, tryZ, w[1], w[2], w[3], fpPos.x, w[4])){
        canZ=false;
      }
    }
  }

  /* Also check cross-movement (diagonal into corner) */
  if(canX && canZ){
    for(wi=0;wi<WALLS.length;wi++){
      var w2=WALLS[wi];
      if(w2[0]==='V'){
        if(checkAxis(fpPos.x, tryX, w2[1], w2[2], w2[3], tryZ, w2[4])){
          /* Diagonal blocked: allow the axis with more clearance */
          var distX=Math.abs(tryX-w2[1]);
          var distZ=Math.min(Math.abs(tryZ-w2[2]),Math.abs(tryZ-w2[3]));
          if(distX<distZ) canX=false; else canZ=false;
        }
      } else {
        if(checkAxis(fpPos.z, tryZ, w2[1], w2[2], w2[3], tryX, w2[4])){
          var distZ2=Math.abs(tryZ-w2[1]);
          var distX2=Math.min(Math.abs(tryX-w2[2]),Math.abs(tryX-w2[3]));
          if(distZ2<distX2) canZ=false; else canX=false;
        }
      }
    }
  }

  if(canX) fpPos.x=tryX;
  if(canZ) fpPos.z=tryZ;

  /* Hard boundary clamp */
  if(fpPos.x<COL_R) fpPos.x=COL_R;
  if(fpPos.x>15-COL_R) fpPos.x=15-COL_R;
  if(fpPos.z<COL_R) fpPos.z=COL_R;
  if(fpPos.z>10-COL_R) fpPos.z=10-COL_R;

  /* Update camera */
  cam.position.set(fpPos.x, fpPos.y, fpPos.z);
  var lookX=fpPos.x+Math.sin(fpYaw)*Math.cos(fpPitch);
  var lookY=fpPos.y+Math.sin(fpPitch);
  var lookZ=fpPos.z+Math.cos(fpYaw)*Math.cos(fpPitch);
  cam.lookAt(lookX,lookY,lookZ);

  /* Update room indicator */
  var rn=detectRoom(fpPos.x,fpPos.z);
  document.getElementById('roomName').textContent=rn;

  /* Update minimap */
  drawMinimap();
}

/* ══════════════════════════════════════
   RENDER LOOP
   ══════════════════════════════════════ */
(function anim(){
  requestAnimationFrame(anim);
  if(walkMode) updateWalk();
  ren.render(scene,cam);
})();
window.addEventListener('resize',function(){
  cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();
  ren.setSize(innerWidth,innerHeight);
});
</script>
